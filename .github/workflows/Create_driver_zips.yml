name: Create driver zips

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  attach-drivers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create driver zips
        run: |
          VERSION=${{ github.event.release.tag_name }}
          for dir in lib/*/; do
            dsm_ver=$(basename "$dir")
            zip -j "${dsm_ver}_drivers_${VERSION}.zip" "${dir}"*.ko
          done

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ github.event.release.tag_name }}
          gh release upload ${VERSION} *_drivers_${VERSION}.zip
